<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(240,1%,25%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(0,0%,19%);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:hsl(45,100%,72%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(35,100%,68%);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(45,100%,72%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(35,100%,68%);stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- Fond principal -->
  <circle cx="200" cy="200" r="195" fill="hsl(0,0%,7%)" filter="url(#shadow)"/>
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)"/>

  <!-- Anneau décoratif extérieur -->
  <circle cx="200" cy="200" r="183" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" stroke-dasharray="6 4"/>

  <!-- Initiales BL au centre -->
  <text
    x="200"
    y="195"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="110"
    font-weight="700"
    fill="url(#goldGrad)"
    filter="url(#glow)"
    letter-spacing="-4"
  >BL</text>

  <!-- Ligne décorative sous les initiales -->
  <line x1="120" y1="218" x2="280" y2="218" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Nom complet -->
  <text
    x="200"
    y="248"
    text-anchor="middle"
    font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
    font-size="18"
    font-weight="600"
    fill="hsl(0,0%,100%)"
    letter-spacing="5"
  >BRYAN LAKARA</text>

  <!-- Titre -->
  <text
    x="200"
    y="272"
    text-anchor="middle"
    font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    font-weight="300"
    fill="hsl(0,0%,70%)"
    letter-spacing="3"
  >DÉVELOPPEUR WEB</text>

  <!-- Points décoratifs -->
  <circle cx="148" cy="272" r="2" fill="url(#goldGrad)"/>
  <circle cx="252" cy="272" r="2" fill="url(#goldGrad)"/>

  <!-- Arc décoratif en haut -->
  <path d="M 90 140 Q 200 80 310 140" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.4"/>
</svg>
